services:
  postgres:
    image: postgres:16
    container_name: ${APP_NAME:-app}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5332}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER in .env} -d ${POSTGRES_DB:?Set POSTGRES_DB in .env}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./src/backend
      dockerfile: API/Dockerfile
    container_name: ${APP_NAME:-app}-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      ConnectionStrings__DefaultConnection: Host=${DB_HOST:-postgres};Port=${DB_PORT:-5432};Database=${POSTGRES_DB:?Set POSTGRES_DB in .env};Username=${POSTGRES_USER:?Set POSTGRES_USER in .env};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_NAME: ${SITE_NAME:-Terrastack}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:5000}
    container_name: ${APP_NAME:-app}-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_SITE_NAME: ${SITE_NAME:-Terrastack}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:5000}
    ports:
      - "3000:3000"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${APP_NAME:-app}-pgadmin
    depends_on:
      postgres:
        condition: service_started
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?Set PGADMIN_DEFAULT_EMAIL in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?Set PGADMIN_DEFAULT_PASSWORD in .env}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:


